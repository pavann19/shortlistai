<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            width: 280px;
            background-color: #07090e;
            color: #f1f5f9;
            margin: 0;
            padding: 16px;
        }
        .header {
            display: flex;
            align-items: center;
            gap: 10px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
            padding-bottom: 10px;
            margin-bottom: 14px;
        }
        .logo {
            width: 24px;
            height: 24px;
            background: linear-gradient(135deg, #06b6d4, #a855f7);
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 11px;
            color: white;
            box-shadow: 0 0 8px rgba(6, 182, 212, 0.5);
        }
        .title {
            font-size: 14px;
            font-weight: bold;
            margin: 0;
        }
        .title span {
            color: #06b6d4;
        }
        .info-card {
            background-color: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 6px;
            padding: 12px;
            font-size: 11.5px;
            line-height: 1.4;
            color: #94a3b8;
            margin-bottom: 14px;
        }
        .btn {
            background-color: #06b6d4;
            color: #07090e;
            border: none;
            outline: none;
            width: 100%;
            padding: 10px;
            font-weight: bold;
            font-size: 12px;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 0 10px rgba(6, 182, 212, 0.2);
        }
        .btn:hover {
            background-color: #0891b2;
            box-shadow: 0 0 14px rgba(6, 182, 212, 0.4);
        }
        .status {
            text-align: center;
            font-size: 11px;
            margin-top: 10px;
            color: #64748b;
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="logo">CP</div>
        <h4 class="title">Copilot<span>ATS</span> Scraper</h4>
    </div>
    
    <div class="info-card">
        Open a job posting page on <strong>LinkedIn</strong> or <strong>Indeed</strong>, then click below to add it directly to your Job Tracker.
    </div>
    
    <button class="btn" id="scrape-btn">Scrape & Track Job</button>
    <div class="status" id="status-text">Ready to scrape</div>

    <script src="popup.js"></script>
</body>
</html>
